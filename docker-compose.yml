version: "3.8"

services:
  app:
    build: .
    container_name: url-shortener-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://ep-purple-flower-amlftox4.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require
      DB_USERNAME: neondb_owner
      DB_PASSWORD: npg_dOh1uXGp3Iwl

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: urlshortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: redis-cache
    ports:
      - "6379:6379"