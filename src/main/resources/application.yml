spring:
  application:
    name: url-shortener

  # spring.datasource is intentionally omitted — DataSourceConfig.java
  # manually configures all shard DataSources (see app.db.* section below).

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  # Flyway autoconfiguration is excluded — DataSourceConfig runs Flyway
  # programmatically on each shard's primary DataSource at startup.
  flyway:
    enabled: false

app:
  base-url: http://localhost:8080

  # ── Database sharding ──────────────────────────────────────────────────────
  # Each shard has an independent PostgreSQL primary + read replica.
  # ShardingService routes writes/reads based on hash(shortCode) % shard-count.
  #
  # For local dev, all shards can point to the same DB instance with
  # different database names (urlshortener_shard0, urlshortener_shard1).
  # In production, each entry maps to a separate PostgreSQL host.
  db:
    shard-count: 2
    pool:
      max-size: 10
      min-idle: 2

    shard0:
      primary-url: jdbc:postgresql://localhost:5436/urlshortener_shard0
      replica-url:  jdbc:postgresql://localhost:5437/urlshortener_shard0
      username: postgres
      password: postgres

    shard1:
      primary-url: jdbc:postgresql://localhost:5434/urlshortener_shard1
      replica-url:  jdbc:postgresql://localhost:5435/urlshortener_shard1
      username: postgres
      password: postgres

  # ── Snowflake ID generation ────────────────────────────────────────────────
  # node-id uniquely identifies this application instance (0–1023).
  # In a multi-instance deployment, each pod/container must have a unique node-id.
  # Use a ConfigMap, Helm value, or environment variable to differentiate:
  #   JAVA_OPTS: -Dapp.snowflake.node-id=1
  snowflake:
    node-id: 0

  # ── Redis cache TTLs ───────────────────────────────────────────────────────
  cache:
    url-ttl-hours: 24
    click-count-ttl-hours: 168   # 7 days

  # ── Redis eviction policy ─────────────────────────────────────────────────
  # volatile-lfu: evict TTL-bearing keys by Least Frequently Used order.
  # Applied via CONFIG SET at startup in RedisEvictionConfig.java.
  # See Redis docs for alternatives: allkeys-lru, volatile-lru, allkeys-lfu
  redis:
    eviction-policy: volatile-lfu
    max-memory: 256mb

  # ── Rate limiting ──────────────────────────────────────────────────────────
  rate-limit:
    capacity: 200
    refill-rate: 100
    window-seconds: 60

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.urlshortener: DEBUG
    org.springframework.data.redis: INFO