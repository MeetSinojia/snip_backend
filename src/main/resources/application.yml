spring:
  application:
    name: url-shortener

  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  base-url: http://localhost:8080
  cache:
    url-ttl-hours: 24
    click-count-ttl-hours: 168   # 7 days
  rate-limit:
    capacity: 10                 # max tokens per bucket
    refill-rate: 10              # tokens refilled per minute
    window-seconds: 60

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.urlshortener: DEBUG
    org.springframework.data.redis: INFO
